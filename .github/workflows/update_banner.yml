name: Update Legendary Banner

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "assets/banner.svg"
      - "assets/update_stats.py"

jobs:
  update-banner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run update script
        run: python assets/update_stats.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "📊 Update legendary banner stats [auto]"
          file_pattern: "assets/banner.svg"
